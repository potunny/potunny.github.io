    <meta charset="UTF-8">

<body>
<button onclick="
playGame('rock');
">Rock</button>
<button onclick="
playGame('paper');
">Paper</button>
<button onclick="
playGame('scissors');
">Scissors</button>
<button onclick="
resetScore();
">Reset Score</button>

<br><br>
<img src="JSONscreen.png" width="500px">
<h5>we use JSON when sending data between computers or when storing data, because is more universal even though it has less features</h5>
<h5>variables are temporary, they only exist on one page, that's why we can save values in localStorage, which only supports strings</h5>
<script>

let score = JSON.parse(localStorage.getItem('score')) || { /*getting value out that we saved earlier, it' also converting the string back to an object, and making an OR, if score is not null, keep left side and if it's null, the right side I THINK*/
        wins: 0, /*score needs to be outside to be global*/
        losses: 0,
        ties: 0
      };

      function resetScore() {
        score = {
          wins: 0,
          losses: 0,
          ties: 0
        };
        localStorage.removeItem('score');
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }

        return computerMove;
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }

        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }

        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        }

/*score result part*/
        if (result === 'You win.') {
          score.wins += 1;
        } else if (result === 'You lose.') {
          score.losses += 1;
        } else if (result === 'Tie.') {
          score.ties += 1;
        }
/*score result part*/

        localStorage.setItem('score', JSON.stringify(score)); /*set item saves in localStorage and stringify
        turns value of score into string*/

        alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`); /*multiline pop-up*/
      }
    

/*objects*/

/*inside an object, can store any type of value, numbers, strings, booleans, as well as other objects, as well as functions, because function is another type of value*/

const product = { /*this {} is the object, const product is creating a variable*/
        name: 'socks',
        price: 1080
        };
        console.log(product); /*an object lets us group multiple values together*/
        console.log(product.name);
        
        product.name = 'cotton socks'; /*this changes the name*/
        console.log(product);

        product.newvalue = true; /*this adds a new value to product*/
        console.log(product);

        delete product.newvalue;
        console.log(product); /*this deletes the added value*/

const product2 = {
  name: 'shirt',
  ['delivery-time']: '7 days' /*brackets are optional if there's 1 string only*/
};
console.log(product2);
console.log(product2.name);

console.log(product2['delivery-time']); /* this would give an error if it wasn't inside [], because time number, also, inside the [], you can store variables and calculations, or anything value*/

/*two examples of built-in objects: JSON and localStorage
to convert JavaScript Object to JSON, console.log(JSON.stringify(product2));
JSON to JS Object it's:
const jsonString = JSON.stringify(product2);
console.log(JSON.parse(jsonString));

*/

</script>
